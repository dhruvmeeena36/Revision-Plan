<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dhruv's 30-Day Interview Roadmap</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0a;--surface:#111;--card:#161616;--border:#242424;
  --text:#e8e8e8;--muted:#555;--muted2:#777;
  --green:#00d97e;--green-bg:rgba(0,217,126,0.07);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;padding:2rem 1rem 5rem}
.wrap{max-width:740px;margin:0 auto}

/* HEADER */
.hdr{margin-bottom:2.5rem}
.hdr-top{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;flex-wrap:wrap;margin-bottom:.5rem}
.hdr h1{font-size:clamp(1.8rem,5vw,2.6rem);font-weight:800;letter-spacing:-.04em;line-height:1.05}
.hdr h1 em{font-style:normal;color:var(--green)}
.hdr-meta{font-size:.7rem;color:var(--muted2);font-family:'JetBrains Mono',monospace;margin-top:.5rem}
.reset-btn{font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--muted);background:none;border:1px solid var(--border);border-radius:6px;padding:5px 10px;cursor:pointer;transition:color .2s,border-color .2s;white-space:nowrap;margin-top:.25rem}
.reset-btn:hover{color:var(--text);border-color:#444}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1.25rem}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 12px;text-align:center}
.stat-n{font-size:1.5rem;font-weight:700;color:var(--green);font-family:'JetBrains Mono',monospace;line-height:1}
.stat-l{font-size:.62rem;color:var(--muted2);text-transform:uppercase;letter-spacing:.08em;margin-top:3px}

/* PROGRESS */
.prog-wrap{margin-bottom:2rem}
.prog-meta{display:flex;justify-content:space-between;font-size:.65rem;font-family:'JetBrains Mono',monospace;color:var(--muted2);margin-bottom:5px}
.prog-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--green);border-radius:2px;transition:width .4s ease}

/* PHASE */
.phase{margin-bottom:1.75rem}
.phase-hdr{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding-bottom:7px;border-bottom:1px solid var(--border)}
.phase-pill{font-size:.62rem;font-family:'JetBrains Mono',monospace;font-weight:700;text-transform:uppercase;letter-spacing:.1em;padding:3px 9px;border-radius:999px}
.phase-range{font-size:.68rem;color:var(--muted2);font-family:'JetBrains Mono',monospace;margin-left:auto}
.phase-pct{font-size:.62rem;font-family:'JetBrains Mono',monospace;color:var(--muted)}

/* DAY CARD */
.day{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;display:flex;gap:10px;align-items:flex-start;cursor:pointer;margin-bottom:5px;transition:border-color .2s,opacity .2s}
.day:hover{border-color:#333}
.day.done{opacity:.38}
.day.done .chk{background:var(--green);border-color:var(--green)}
.chk{width:19px;height:19px;border-radius:50%;border:1.5px solid #333;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.chk svg{display:none}
.day.done .chk svg{display:block}
.dnum{font-size:.62rem;font-family:'JetBrains Mono',monospace;color:var(--muted);min-width:34px;padding-top:2px;font-weight:500}
.dbody{flex:1;min-width:0}
.dtitle{font-size:.88rem;font-weight:700;color:var(--text);margin-bottom:4px;line-height:1.3}
.dtopics{font-size:.74rem;color:var(--muted2);line-height:1.65;font-family:'JetBrains Mono',monospace}
.dtags{display:flex;flex-wrap:wrap;gap:4px;margin-top:7px}
.tag{font-size:.6rem;padding:2px 8px;border-radius:999px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;font-family:'JetBrains Mono',monospace}

/* EXPAND */
.expand-row{display:flex;align-items:center;gap:6px;margin-top:7px}
.expand-btn{font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--muted);background:none;border:none;cursor:pointer;padding:0;transition:color .15s}
.expand-btn:hover{color:var(--text)}
.detail{display:none;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.detail.open{display:block}
.detail-label{font-size:.6rem;font-family:'JetBrains Mono',monospace;color:var(--green);text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px;font-weight:700}
.detail ul{list-style:none;padding:0}
.detail ul li{font-size:.72rem;color:var(--muted2);padding:2px 0 2px 12px;position:relative;line-height:1.5;font-family:'JetBrains Mono',monospace}
.detail ul li::before{content:'›';position:absolute;left:0;color:var(--green)}
</style>
</head>
<body>
<div class="wrap">

<div class="hdr">
  <div class="hdr-top">
    <div>
      <h1>30-Day <em>Interview</em><br>Prep Roadmap</h1>
      <div class="hdr-meta">// Dhruv Meena · IIT Madras · Full Stack + DSA · Click day to mark done</div>
    </div>
    <button class="reset-btn" onclick="resetAll()">↺ Reset all</button>
  </div>
</div>

<div class="stats">
  <div class="stat"><div class="stat-n" id="sn">0</div><div class="stat-l">Done</div></div>
  <div class="stat"><div class="stat-n">30</div><div class="stat-l">Total</div></div>
  <div class="stat"><div class="stat-n" id="sp">0%</div><div class="stat-l">Progress</div></div>
  <div class="stat"><div class="stat-n" id="sr">30</div><div class="stat-l">Remaining</div></div>
</div>

<div class="prog-wrap">
  <div class="prog-meta"><span id="pl">0 / 30 days completed</span><span id="pr">30 days left</span></div>
  <div class="prog-bar"><div class="prog-fill" id="bar" style="width:0%"></div></div>
</div>

<div id="rm"></div>
</div>

const KEY = 'dhruv_30day_v2';
let checked = JSON.parse(localStorage.getItem(KEY) || '[]');
let expanded = {};

function save() { localStorage.setItem(KEY, JSON.stringify(checked)); }

function updateStats() {
  const n = checked.length;
  document.getElementById('sn').textContent = n;
  document.getElementById('sp').textContent = Math.round(n/30*100) + '%';
  document.getElementById('sr').textContent = 30 - n;
  document.getElementById('bar').style.width = (n/30*100) + '%';
  document.getElementById('pl').textContent = n + ' / 30 days completed';
  document.getElementById('pr').textContent = (30-n) + ' days left';
}

function resetAll() {
  if (!confirm('Reset all progress?')) return;
  checked = []; expanded = {};
  localStorage.removeItem(KEY);
  document.querySelectorAll('.day').forEach(c => c.classList.remove('done'));
  document.querySelectorAll('.detail').forEach(d => d.classList.remove('open'));
  document.querySelectorAll('.expand-btn').forEach(b => b.textContent = '+ details');
  updateStats();
}

const rm = document.getElementById('rm');

PHASES.forEach(p => {
  const ph = document.createElement('div');
  ph.className = 'phase';
  const hdr = document.createElement('div');
  hdr.className = 'phase-hdr';
  hdr.innerHTML = `<span class="phase-pill" style="background:${p.pill_bg};color:${p.pill_c}">${p.label}</span><span class="phase-range">${p.range}</span>`;
  ph.appendChild(hdr);

  p.days.forEach(d => {
    const card = document.createElement('div');
    card.className = 'day' + (checked.includes(d.n) ? ' done' : '');

    const detailId = 'detail-' + d.n;
    const expandId = 'expand-' + d.n;

    card.innerHTML = `
      <div class="chk">
        <svg width="9" height="7" viewBox="0 0 9 7" fill="none">
          <path d="M1 3.5L3 5.5L8 1" stroke="#0a0a0a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="dnum">Day ${String(d.n).padStart(2,'0')}</div>
      <div class="dbody">
        <div class="dtitle">${d.title}</div>
        <div class="dtopics">${d.topics}</div>
        <div class="dtags">${d.tags.map(t=>`<span class="tag" style="background:${t.bg};color:${t.c}">${t.t}</span>`).join('')}</div>
        <div class="expand-row">
          <button class="expand-btn" id="${expandId}">+ details</button>
        </div>
        <div class="detail" id="${detailId}">
          <div class="detail-label">${d.detail.label}</div>
          <ul>${d.detail.items.map(i=>`<li>${i}</li>`).join('')}</ul>
        </div>
      </div>`;

    card.querySelector('.expand-btn').addEventListener('click', e => {
      e.stopPropagation();
      const det = document.getElementById(detailId);
      const btn = document.getElementById(expandId);
      const isOpen = det.classList.contains('open');
      det.classList.toggle('open');
      btn.textContent = isOpen ? '+ details' : '− details';
    });

    card.addEventListener('click', e => {
      if (e.target.classList.contains('expand-btn')) return;
      const i = checked.indexOf(d.n);
      if (i === -1) { checked.push(d.n); card.classList.add('done'); }
      else { checked.splice(i,1); card.classList.remove('done'); }
      save(); updateStats();
    });

    ph.appendChild(card);
  });
  rm.appendChild(ph);
});

updateStats();
</script>
